name: Build and push base image

on:
  push:
    paths:
      - Dockerfile.base
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ghcr.io/softcatala/comparativa-tts-catala-base:latest
            ghcr.io/softcatala/comparativa-tts-catala-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
